<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered age calculator with smart validation and professional UI design." />
  <title>Age Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <main class="container" aria-labelledby="main-heading">
      <div class="brand">       
        <h1 id="main-heading">Age Calculator</h1>       
      </div>

      <form class="input-group" id="age-form" novalidate>
        <div class="input-box">
          <label for="day">Day</label>
          <input type="number" id="day" name="day" placeholder="DD" min="1" max="31" required />
        </div>
        <div class="input-box">
          <label for="month">Month</label>
          <input type="number" id="month" name="month" placeholder="MM" min="1" max="12" required />
        </div>
        <div class="input-box">
          <label for="year">Year</label>
          <input type="number" id="year" name="year" placeholder="YYYY" min="1900" max="9999" required />
        </div>
        <button type="submit" class="primary-button">Calculate Age</button>
      </form>

      <p class="error" id="error" role="alert" aria-live="assertive"></p>

      <section class="result" id="result" aria-live="polite">
        <h2>Calculated Age:</h2>
        <div class="age-box">
          <div class="age-item">
            <span id="years">0</span>
            <strong>Years</strong>
          </div>
          <div class="age-item">
            <span id="months">0</span>
            <strong>Months</strong>
          </div>
          <div class="age-item">
            <span id="days">0</span>
            <strong>Days</strong>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
